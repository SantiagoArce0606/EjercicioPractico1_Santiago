<!-- fragmento 1 para Agregar categoria en ventana modal -->
<section th:fragment="agregar">
    <div class='row py-4 mb-2 bg-light'>
        <div class='col-md-1'></div>
        <div class='col-md-3'>
            <button type="button" class="btn btn-primary" sec:authorize="hasRole('ROLE_ADMIN')"
                    data-bs-toggle="modal" data-bs-target="#agregarCategoriaModal">
                <i class="fa-solid fa-plus"></i> Agregar categoria</button>
        </div>
    </div>
    <div class="modal fade" id="agregarCategoriaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h1 class="modal-title fs-5"><i class="fa-solid fa-layer-group"></i> Agregar categoria</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action='@{/categoria/guardar}' th:object='${categoria}' class='was-validated' method="post">
                    <div class="modal-body">
                        <div class='mb-3'>
                            <label>Nombre</label>
                            <input type="text" name='nombre' class='form-control' required/></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> Cerrar</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk"></i> Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- fragmento 2 para el listado de categorias -->
<section th:fragment="listado" class="p-3">
    <div class="row p-3">
        <div class="col-md-9">
            <div class="card p-2">
                <div class="card-header"><h4>Listado de categorias</h4></div>
                <div class="card-body">
                    <div th:if="${categorias != null and !categorias.empty}">
                        <table class="table table-striped table-hover">
                            <thead><tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th></th>
                            </tr></thead>
                            <tbody>
                                <tr th:each="categoria : ${categorias}">
                                    <td>[[${categoria.id}]]</td>
                                    <td>[[${categoria.nombre}]]</td>
                                    <td><td>
                                     <form th:action="@{/categoria/eliminar}" method="post" style="display:inline">
                                        <input type="hidden" name="id" th:value="${categoria.id}"/>
                                            <button type="submit" class="btn btn-danger"
                                                onclick="return confirm('¿Deseas eliminar esta categoría?')">
                                                    <i class="fa-solid fa-trash"></i> Eliminar
                                            </button>
                                    </form>
                                    </td></td>
                                </tr>
                            </tbody>
                        </table></div>
                    <div class="text-center p-2" th:if="${categorias == null or categorias.empty}">
                        <span>Lista vacia</span></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center bg-success text-white mb-3">
                <div class="card-body"><h3>Total categorias</h3>
                    <h4 class="fs-2"><i class="fas fa-layer-group"></i> total categoria</h4>
                </div></div>
        </div>
    </div>
</section>

<!-- 3 Fragmento que se utiliza en la pagina modificar.html -->
<section th:fragment="editar">
    <div class="row">
        <div class="col-md-2"></div>
        <div class="col-md-8">
            <form method="POST" th:action="@{/categoria/guardar}" th:object="${categoria}" class="was-validated">
                <input type="hidden" name="id" th:field="*{id}"/>
                <div class="row py-4 mb-4 bg-light">
                    <div class="col-md-4 d-grid">
                        <a th:href="@{/categoria/listado}" class="btn btn-primary">
                            <i class="fas fa-arrow-left"></i> Regresar</a>
                    </div>
                    <div class="col-md-4 d-grid">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-check"></i> Guardar</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <div class="card">
                            <div class="card-header"><h4>Actualizar</h4></div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="nombre">Nombre</label>
                                    <input type="text" class="form-control" name="nombre"
                                           th:field="*{nombre}" required/>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
